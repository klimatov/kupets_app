name: kupets_app
description: Мобильное приложение пивного бара «Купец&Ко».
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  go_router: ^14.6.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
